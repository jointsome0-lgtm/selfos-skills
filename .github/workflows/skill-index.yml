name: Validate skills and plugins

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # full history so the version-bump check can diff against the PR base
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - run: python scripts/build_index.py --check
      - run: python scripts/validate_plugins.py
      - run: python scripts/test_check_version_bump.py
      - name: Plugin version bump check
        if: github.event_name == 'pull_request'
        run: python scripts/check_version_bump.py --base "origin/$GITHUB_BASE_REF"
      - run: python plugins/sdd/scripts/test_sync_conventions.py
      - run: python plugins/sdd/scripts/test_check_decision_log.py
      - run: shellcheck scripts/*.sh plugins/*/scripts/*.sh
      - name: Watcher tests
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q bats
          bats plugins/codex-pr/scripts/test_codex_pr_watch.bats
      # deliberately unpinned: the point is to catch the marketplace breaking
      # against the Claude Code version users actually install today
      - name: Marketplace install check
        run: |
          npm install -g @anthropic-ai/claude-code
          ./scripts/check_plugin_install.sh
