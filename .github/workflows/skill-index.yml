name: Validate skills and plugins

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - run: python scripts/build_index.py --check
      - run: python scripts/validate_plugins.py
      - run: python plugins/sdd/scripts/test_sync_conventions.py
      - run: python plugins/sdd/scripts/test_check_decision_log.py
