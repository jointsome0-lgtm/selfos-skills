name: Validate portable Agent Skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # full history so the version-bump check can diff against the PR base
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Validate the portable catalog and host adapters
        run: python scripts/validate_skills.py
      - name: Test the portable catalog parser
        run: python scripts/test_skill_catalog.py
      - name: Test the adapter validator
        run: python scripts/test_validate_plugins.py
      - name: Check generated composed-skill bundles
        run: python scripts/build_bundles.py --check
      - name: Test the bundle builder
        run: python scripts/test_build_bundles.py
      - name: Check the generated repository index
        run: python scripts/build_index.py --check
      - name: Validate the aggregate Claude adapter
        run: python scripts/validate_plugins.py
      - name: Test the version-bump gate
        run: python scripts/test_check_version_bump.py
      - name: Test the installation smoke matrix
        run: python scripts/test_check_install_matrix.py
      - name: Version bump check
        if: github.event_name == 'pull_request'
        run: python scripts/check_version_bump.py --base "origin/$GITHUB_BASE_REF"
      - name: Test portable SDD helpers
        run: |
          python skills/sdd-conventions/scripts/test_sync_conventions.py
          python skills/sdd-conventions/scripts/test_check_decision_log.py
      - name: ShellCheck portable helpers
        run: find scripts skills -type f -name '*.sh' -print0 | xargs -0 -r shellcheck
      - name: Test the Codex PR watcher
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q bats
          bats skills/watch/scripts/test_codex_pr_watch.bats

  install-matrix-config:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: matrix
        name: Load the supported-agent matrix
        run: echo "matrix=$(python3 scripts/check_install_matrix.py --github-matrix)" >> "$GITHUB_OUTPUT"

  install-matrix:
    name: Install smoke (${{ matrix.id }})
    needs: install-matrix-config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.install-matrix-config.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Codex is exact-pinned in the matrix after the seven-day hold; Claude
      # stays deliberately current to retain the existing marketplace-drift check.
      - name: Install representative host CLI
        if: matrix.npm_install != ''
        run: npm install -g "${{ matrix.npm_install }}"
      - name: Run installation and discovery smoke test
        env:
          DISABLE_TELEMETRY: "1"
        run: python3 scripts/check_install_matrix.py --case "${{ matrix.id }}"
